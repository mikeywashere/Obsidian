# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    # runs-on: self-hosted
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.fsproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Cache .NET workloads
      uses: actions/cache@v4
      with:
        path: |
          ~/.dotnet/workloads
          ~/.dotnet/packs
        key: ${{ runner.os }}-dotnet-workloads-aspire-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-dotnet-workloads-aspire-
          ${{ runner.os }}-dotnet-workloads-
    
    - name: Install .NET Aspire workload
      run: dotnet workload install aspire
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore
    
    - name: Install .NET Playwright browsers
      run: pwsh source/Obsidian.UnitTests/bin/Debug/net10.0/playwright.ps1 install chromium
    
    - name: Test
      run: dotnet test --no-build --verbosity normal --filter "Category!=Integration"
